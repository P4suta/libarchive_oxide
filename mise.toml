# Install tools with `mise install`. Rust configuration is in rust-toolchain.toml.

[tools]
rust = "stable"

lefthook = "2.1.9"
committed = "latest"
just = "1.50.0"

typos = "1.48.0"
actionlint = "1.7.12"

# REUSE runs through uvx.
uv = "latest"

cargo-binstall = "latest"

"cargo:cargo-msrv" = "latest"
"cargo:cargo-deny" = "latest"
"cargo:cargo-semver-checks" = "latest"
"cargo:release-plz" = "latest"

[settings.cargo]
binstall = true

[tasks.hooks]
description = "Install the git hooks (see lefthook.yml)"
run = "lefthook install"
