# SPDX-License-Identifier: MIT OR Apache-2.0
#
# REUSE bulk annotations for files that carry no inline SPDX header: prose docs
# (Markdown), the auto-generated Cargo lockfile, generated dotfiles, the CODEOWNERS
# entry, and the binary fuzz-corpus seeds. Every first-party source and config file
# that accepts comments (*.rs, *.toml, *.sh, *.yml, .editorconfig, .gitattributes)
# carries its own inline SPDX header instead. Identity is unified across the sibling
# projects: MIT OR Apache-2.0, dual-licensed to every contributor. See LICENSES/MIT.txt
# and LICENSES/Apache-2.0.txt.
#
# `target/` and `fuzz/target/` are git-ignored, hence outside `reuse lint`. The license
# texts under `LICENSES/` need no annotation — REUSE treats them as the license
# definitions themselves.

version = 1

# Prose docs, the auto-generated lockfile, and generated/auto-managed dotfiles that
# either take no comment or would have an inline header stripped on regeneration.
# `precedence = "aggregate"` so a file that later grows an inline header combines with
# this declaration rather than conflicting with it.
[[annotations]]
path = [
  "**/*.md",
  "Cargo.lock",
  ".gitignore",
  "fuzz/.gitignore",
  ".github/CODEOWNERS",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 libarchive_oxide contributors"
SPDX-License-Identifier = "MIT OR Apache-2.0"

# Binary payloads that can hold no comment and receive no inline header: the frozen
# fuzz-corpus seeds (encoded archive/codec bytes — a wire-format fact, not authored
# prose). `precedence = "override"` makes this config the sole authority for these paths.
[[annotations]]
path = ["fuzz/corpus/**"]
precedence = "override"
SPDX-FileCopyrightText = "2026 libarchive_oxide contributors"
SPDX-License-Identifier = "MIT OR Apache-2.0"
