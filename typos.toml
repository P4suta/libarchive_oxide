# typos — strict spell check across the repo, run by the CI `typos` job
# (crate-ci/typos) and the pre-commit hook. Fix typos rather than suppress them;
# keep the allowlist below to the minimum the archive/codec vocabulary needs. Every
# entry is a name a format or codec chose, not a word this project misspelled.

[default]
locale = "en-us"

[default.extend-words]
# Archive-format and codec vocabulary that is not English prose.
zstd = "zstd"     # Zstandard codec
lzma = "lzma"     # the LZMA/xz codec family
ustar = "ustar"   # POSIX tar "ustar" magic
cpio = "cpio"     # the cpio archive format
# `bsd*` / `ox*` are the drop-in CLI tool names (bsdtar/bsdcpio/bsdcat/bsdunzip
# and oxtar/oxcpio/oxcat/oxunzip); not misspellings.
bsdtar = "bsdtar"
bsdcpio = "bsdcpio"
bsdcat = "bsdcat"
bsdunzip = "bsdunzip"
oxtar = "oxtar"
oxcpio = "oxcpio"
oxcat = "oxcat"
oxunzip = "oxunzip"
# `ba` / `ded` occur inside committed hex digests and CRC/offset literals (e.g.
# `7ffbbd64ba73c260`), split into subtokens by the checker — not words.
ba = "ba"
ded = "ded"
# `mis-` is a valid English prefix (mis-decode, mis-read), not a misspelling.
mis = "mis"

[default.extend-identifiers]
ba = "ba"
ded = "ded"

[files]
extend-exclude = [
    "target/**",
    "**/*.lock",
    # Machine-generated by release-plz from commit subjects; short SHAs split into
    # subtokens and get flagged. The source is reviewed at commit time.
    "CHANGELOG.md",
    # Curated fuzz corpus: encoded archive/codec bytes, never prose.
    "fuzz/corpus/**",
]

# Binary archive/fixture payloads are bytes, not prose. `extend-exclude` filters
# directory walks; a `check-file = false` type rule also turns off content checking
# when the pre-commit hook names a staged file explicitly.
[type.binfixture]
extend-glob = [
    "*.tar",
    "*.tgz",
    "*.cpio",
    "*.ar",
    "*.a",
    "*.zip",
    "*.7z",
    "*.iso",
    "*.gz",
    "*.zst",
    "*.xz",
    "*.lz4",
    "*.bin",
]
check-file = false

[type.toml]
extend-glob = ["*.toml"]

[type.rust]
extend-glob = ["*.rs"]
