# Install with `mise run hooks`.

min_version: 2.1.9
assert_lefthook_installed: true
no_tty: false
colors: true

commit-msg:
  commands:
    conventional:
      run: mise exec -- committed --commit-file {1}

pre-commit:
  parallel: false
  follow: true
  commands:
    cargo-fmt:
      tags: format
      glob: "*.rs"
      run: mise exec -- just fmt
      stage_fixed: true

    typos:
      tags: spell
      run: mise exec -- typos --write-changes {staged_files}
      stage_fixed: true

    clippy:
      tags: lint
      glob: "*.rs"
      run: mise exec -- just lint
      fail_text: "Host Clippy failed; fix every warning before committing."

    clippy-linux:
      tags: lint
      glob: "*.rs"
      run: mise exec -- just lint-linux
      fail_text: "Linux-target Clippy failed; fix cfg-gated warnings before committing."

    check-no-dyn:
      tags: lint
      glob: "*.rs"
      run: mise exec -- just no-dyn

    reuse:
      tags: license
      glob: "{**/*.rs,**/*.toml,**/*.md,**/*.yml,Justfile,REUSE.toml,**/LICENSES/*}"
      run: mise exec -- just reuse

    license-sync:
      tags: license
      glob: "{LICENSES/*,**/LICENSES/*}"
      run: mise exec -- just license-sync

pre-push:
  parallel: false
  follow: true
  commands:
    local-ci:
      tags: ci
      run: mise exec -- just ci
      fail_text: "Local CI failed; fix the reported gate before pushing."

# Explicit manual entry point: `lefthook run local-ci`.
local-ci:
  parallel: false
  follow: true
  commands:
    all:
      tags: ci
      run: mise exec -- just ci
