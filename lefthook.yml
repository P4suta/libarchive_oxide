# Install with `mise run hooks`.

assert_lefthook_installed: true
no_tty: false
colors: true

commit-msg:
  commands:
    conventional:
      run: committed --commit-file {1}

pre-commit:
  parallel: false
  follow: true
  commands:
    cargo-fmt:
      tags: format
      glob: "*.rs"
      run: cargo fmt --all
      stage_fixed: true

    typos:
      tags: spell
      run: typos --write-changes {staged_files}
      stage_fixed: true

    clippy:
      tags: lint
      glob: "*.rs"
      run: cargo clippy --workspace --all-targets --all-features -- -D warnings

    check-no-dyn:
      tags: lint
      glob: "*.rs"
      run: bash scripts/check-no-dyn.sh

    reuse:
      tags: license
      glob: "{**/*.rs,**/*.toml,**/*.md,**/*.yml,**/*.sh,REUSE.toml,**/LICENSES/*}"
      run: uvx --with charset-normalizer reuse lint

    license-sync:
      tags: license
      glob: "{LICENSES/*,**/LICENSES/*}"
      run: bash scripts/check-license-sync.sh
