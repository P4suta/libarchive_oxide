# Conventional Commit validation.

style = "conventional"
subject_length = 0
line_length = 0
subject_capitalized = false
imperative_subject = false
allowed_types = [
  "feat",
  "fix",
  "build",
  "ci",
  "docs",
  "test",
  "refactor",
  "perf",
  "style",
  "chore",
  "revert",
]
