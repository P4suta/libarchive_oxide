# committed checks the one thing release-plz needs from a commit: a Conventional
# Commits type prefix. It is a Rust tool (no Node), run by the commit-msg hook and a
# CI job. Length and capitalization rules are off: subjects here are prose, can run
# past 72 columns, and are lower-case by convention.

style = "conventional"
subject_length = 0
line_length = 0
subject_capitalized = false
imperative_subject = false
allowed_types = [
  "feat",
  "fix",
  "build",
  "ci",
  "docs",
  "test",
  "refactor",
  "perf",
  "style",
  "chore",
  "revert",
]
