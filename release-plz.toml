# See docs/adr/0002-workspace-releases.md.

[workspace]
dependencies_update = false
release_always = false
# Re-enable after 0.2.0 establishes the intentionally breaking baseline.
semver_check = false
git_tag_enable = false
git_release_enable = false
changelog_update = false

[[package]]
name = "libarchive_oxide-core"
version_group = "libarchive_oxide-workspace"

[[package]]
name = "libarchive_oxide"
version_group = "libarchive_oxide-workspace"
changelog_update = true
changelog_path = "./CHANGELOG.md"
changelog_include = ["libarchive_oxide-core", "libarchive_oxide-cli"]
git_tag_enable = true
git_tag_name = "v{{ version }}"
git_release_enable = true

[[package]]
name = "libarchive_oxide-cli"
version_group = "libarchive_oxide-workspace"
