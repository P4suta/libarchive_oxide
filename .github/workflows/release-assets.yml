# Manual native build and optional draft-release upload for the four CLI
# binaries. Published releases are immutable, so this workflow never reacts to
# a release event. Upload mode targets the draft created by release-plz; after
# every matrix job succeeds, a maintainer inspects and publishes that draft in
# the GitHub UI.

name: release assets

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build (normally an unpublished draft's vX.Y.Z tag)
        required: true
        type: string
      upload:
        description: Upload archives and checksums to the draft GitHub Release
        required: true
        default: false
        type: boolean
      confirm:
        description: Type PREFLIGHT without upload, or ASSETS with upload
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-assets-${{ inputs.ref }}
  cancel-in-progress: false

jobs:
  authorize:
    name: validate manual asset request
    runs-on: ubuntu-latest
    steps:
      - name: require an exact typed confirmation
        env:
          UPLOAD: ${{ inputs.upload }}
          CONFIRM: ${{ inputs.confirm }}
        run: |
          if [ "$UPLOAD" = "true" ] && [ "$CONFIRM" = "ASSETS" ]; then
            exit 0
          fi
          if [ "$UPLOAD" != "true" ] && [ "$CONFIRM" = "PREFLIGHT" ]; then
            exit 0
          fi
          echo "::error::confirmation does not match upload mode"
          exit 1

  cli-binaries:
    name: cli binaries (${{ matrix.target }})
    needs: authorize
    environment: release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-pc-windows-msvc
            os: windows-2025
          - target: x86_64-apple-darwin
            os: macos-15-intel
          - target: aarch64-apple-darwin
            os: macos-15
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: build release binaries
        run: cargo build --locked --release -p libarchive_oxide-cli --target ${{ matrix.target }}
      - name: smoke-test all binaries
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          suffix=""
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            suffix=".exe"
          fi
          for bin in oxtar oxcpio oxcat oxunzip; do
            "target/$TARGET/release/$bin$suffix" --version
          done
      - name: upload archives and checksums to the draft
        if: inputs.upload
        uses: taiki-e/upload-rust-binary-action@f0d45ae91ee7b8ee928de7a9d04d893a08bcbec6 # v1.30.2
        with:
          bin: oxtar,oxcpio,oxcat,oxunzip
          target: ${{ matrix.target }}
          archive: libarchive_oxide-cli-$tag-$target
          checksum: sha256
          ref: refs/tags/${{ inputs.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
