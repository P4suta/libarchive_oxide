# CI for libarchive_oxide (safe-Rust unified archive library).
#
# Layout under test: three published crates + an excluded fuzz sub-workspace.
#   - libarchive_oxide-core   no_std + alloc, zero external deps (sans-I/O state machines).
#   - libarchive_oxide        the std flagship (auto-detection, FS extraction, safe paths, codecs).
#   - libarchive_oxide-cli    the bsdtar-family bins (oxtar/oxcpio/oxcat/oxunzip).
#   - xtask                   portable repository-policy checks used by Just and CI.
#   - fuzz/                   cargo-fuzz targets; outside the workspace, nightly-only.
#
# Policy:
#   - Every third-party action is SHA-pinned (Dependabot bumps them weekly); the comment records
#     the human-readable version. `dtolnay/rust-toolchain@stable` is likewise pinned by commit.
#   - `Swatinem/rust-cache` over raw `actions/cache` for the cargo state.
#   - A single `ci-required` aggregation gate is the one status context branch protection references,
#     so the ruleset never desyncs as jobs are added or renamed.

name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs on the same ref to keep the queue lean.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  # NOTE: `-D warnings` is applied *per job*, only on the stable toolchain we can reproduce locally
  # (fmt/clippy/test/no_std/doc). It is deliberately NOT global: the msrv (cargo-msrv installs 1.85 /
  # 1.87), fuzz (nightly), and big-endian (cross/qemu) jobs run toolchains or emulators the dev box
  # cannot reproduce, and a version-specific warning from the compiler or a dependency there would
  # turn CI red for a reason invisible to every local gate. Those jobs still fail on real errors.

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: rustfmt
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: just@1.50.0
      - run: just fmt-check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -D warnings
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: clippy
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: just@1.50.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: just lint

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      RUSTFLAGS: -D warnings
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: just@1.50.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # This runs the same conformance and committed fuzz-replay corpus through the maximal
      # portable and native profiles on all three OSes. The profiles are deliberately exclusive.
      - run: just test

  no_std:
    name: no_std (thumbv7em)
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -D warnings
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          targets: thumbv7em-none-eabi
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: just@1.50.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # libarchive_oxide-core must stay pure no_std + alloc; building for a bare-metal target with no
      # std available proves it. Do NOT pass --all-features here (that pulls std).
      - run: just no-std

  doc:
    name: doc (rustdoc, warnings are errors)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: just@1.50.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # Intra-doc links and doctests across the whole public surface. Keep in sync with docs.yml
      # (which additionally deploys the result to Pages).
      - env:
          RUSTDOCFLAGS: -D warnings
        run: just doc

  typos:
    name: typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14 # v1.48.0

  msrv:
    name: msrv (core 1.85, flagship 1.87)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: cargo-msrv
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: just@1.50.0
      # `cargo-msrv verify` reads each crate's declared `rust-version` and proves it actually builds
      # on that floor (installing the toolchain via rustup). The two crates have different floors —
      # core's zero-dep no_std baseline (1.85) and the flagship's codec closure (1.87) — so each is
      # verified against its own manifest. The CLI inherits the flagship's floor and is covered by it.
      - name: verify declared MSRVs
        run: just msrv

  nodyn:
    name: no-dyn gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: just@1.50.0
      # Mechanically enforce static format/codec dispatch. The safe-Rust xtask permits only the
      # standard Error::source signature needed to preserve concrete I/O sources.
      - run: just no-dyn

  reuse:
    name: reuse (SPDX/REUSE compliance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6.0.0

  license-sync:
    name: crate package, codec and release policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: just@1.50.0
      - run: just license-sync
      - name: verify license texts are packaged
        run: just package-licenses
      - name: compile packaged crates from an external consumer
        run: just package-smoke
      - name: verify portable exclusion and explicit native codec backends
        run: just codec-policy
      - name: verify manual draft-first release policy
        run: just release-policy

  deny:
    name: cargo-deny (advisories, licenses, bans, sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: cargo-deny
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: just@1.50.0
      - run: just deny

  semver-checks:
    name: semver-checks (PR API compatibility)
    # PRs only: compares this branch's public API against the crates.io baseline. A push to main has
    # no "proposed change" to weigh, and the release job re-runs the same gate at publish time.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: explain first-publish bootstrap skip
        if: vars.V02_BASELINE_PUBLISHED != 'true'
        run: >-
          echo "::notice::Skipping semver-checks until v0.2 establishes the new crates.io
          baselines; setting V02_BASELINE_PUBLISHED=true enables this gate for later PRs."
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        if: vars.V02_BASELINE_PUBLISHED == 'true'
        with:
          tool: cargo-semver-checks
      # Flags an SemVer-breaking change to the two published library crates that is not paired with a
      # major bump. `release-plz` re-runs the same tool at publish time (release.yml); this is the
      # early PR-time signal.
      - if: vars.V02_BASELINE_PUBLISHED == 'true'
        # cargo-semver-checks otherwise heuristically enables almost every feature, which would
        # intentionally trip the portable/native mutual-exclusion guard.
        run: >-
          cargo semver-checks check-release
          -p libarchive_oxide-core
          -p libarchive_oxide
          --default-features

  fuzz:
    name: fuzz (nightly, build + short run)
    runs-on: ubuntu-latest
    env:
      # cargo-binstall distributes cargo-fuzz as a musl-linked executable. Explicitly select the
      # runner's GNU target so cargo-fuzz does not mistake its own build target for the fuzz target;
      # ASan is incompatible with a statically linked musl libc.
      FUZZ_TARGET: x86_64-unknown-linux-gnu
      # Keep malformed length arithmetic fail-closed in panic-abort tests and libFuzzer builds.
      RUSTFLAGS: -C overflow-checks=yes
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: cargo-fuzz
      # libFuzzer needs nightly + the sanitizer runtime; install it via rustup (no unpinnable
      # nightly action ref). The fuzz crate is outside the workspace, so it carries its own lockfile.
      - name: install nightly (libFuzzer)
        run: rustup toolchain install nightly --profile minimal --no-self-update
      # A panic in a dependency must fail as a process abort here as it does under libFuzzer.
      # Overflow checks keep malformed length arithmetic on the same fail-closed path.
      - name: malformed-codec regression (both profiles, panic abort, overflow checks)
        run: |
          cargo +nightly test -Z panic-abort-tests \
            -p libarchive_oxide --no-default-features \
            --features portable-codecs,aes,sevenz,async,tokio \
            --test filtered_io_v2 malformed_zstd_block_does_not_panic
          cargo +nightly test -Z panic-abort-tests \
            -p libarchive_oxide --no-default-features \
            --features native-codecs,aes,sevenz,async,tokio \
            --test filtered_io_v2 malformed_zstd_block_does_not_panic
      # Every target must compile against libFuzzer with each mutually exclusive profile.
      - run: cargo +nightly fuzz build --target "$FUZZ_TARGET"
      - run: >-
          cargo +nightly fuzz build --no-default-features --features native-codecs
          --target "$FUZZ_TARGET"
      # Both profiles run the same target list and committed corpus. The portable budget remains the
      # deeper default campaign; native gets a shorter differential run on the identical seeds.
      - name: portable coverage-guided fuzz run per target
        run: |
          set -euo pipefail
          targets=$(cargo +nightly fuzz list)
          for t in $targets; do
            echo "::group::portable fuzz $t"
            cargo +nightly fuzz run "$t" --target "$FUZZ_TARGET" -- -max_total_time=30 -rss_limit_mb=4096
            echo "::endgroup::"
          done
      - name: native coverage-guided fuzz run per target
        run: |
          set -euo pipefail
          targets=$(cargo +nightly fuzz list)
          for t in $targets; do
            echo "::group::native fuzz $t"
            cargo +nightly fuzz run "$t" --no-default-features --features native-codecs \
              --target "$FUZZ_TARGET" -- -max_total_time=10 -rss_limit_mb=4096
            echo "::endgroup::"
          done

  big-endian:
    name: big-endian (s390x, qemu)
    # The archive formats carry big fields (zip is little-endian, tar is ASCII-octal, cpio/7z/iso
    # mix endian): a byte-order bug hides on the little-endian CI matrix. `cross` runs both library
    # suites under qemu on a big-endian target to surface it. The CLI contract suite is excluded
    # because it spawns target binaries as child processes, bypassing cross's top-level qemu runner.
    # Promoted to a required gate after three consecutive green runs on main. Stable/native replay
    # and nightly libFuzzer already cover the full corpus; skip those CPU-heavy invariant batches
    # under QEMU and use optimized code so this gate remains focused on byte-order behavior.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: cross
      - name: test suite on big-endian s390x under qemu
        run: >-
          cross test
          -p libarchive_oxide-core
          -p libarchive_oxide
          --no-default-features
          --features libarchive_oxide/portable-codecs,libarchive_oxide/aes,libarchive_oxide/sevenz,libarchive_oxide/async,libarchive_oxide/tokio
          --release
          --target s390x-unknown-linux-gnu
          --
          --skip corpus_files_replay_without_panic
          --skip arbitrary_seeds_uphold_invariants
          --skip seed_mutants_uphold_invariants

  actionlint:
    name: actionlint (workflow self-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: actionlint
        env:
          ACTIONLINT_VERSION: 1.7.12
        run: |
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            | tar xz -C /tmp actionlint
          /tmp/actionlint -color

  # Single aggregation gate. `if: always()` so it runs when an upstream job fails; `skipped` counts
  # as pass, letting PR-only jobs (semver-checks) report green on push / merge_group.
  ci-required:
    name: ci-required
    if: always()
    needs:
      - fmt
      - clippy
      - test
      - no_std
      - doc
      - typos
      - msrv
      - nodyn
      - reuse
      - license-sync
      - deny
      - semver-checks
      - fuzz
      - big-endian
      - actionlint
    runs-on: ubuntu-latest
    steps:
      - name: verify all required jobs passed (skipped counts as pass)
        run: |-
          results="${{ join(needs.*.result, ' ') }}"
          echo "needs results: $results"
          for r in $results; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::a required job did not pass ($r)"
              exit 1
            fi
          done
          echo "all required jobs passed"
